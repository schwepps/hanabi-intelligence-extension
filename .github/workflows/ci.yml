name: CI

on:
  push:
  pull_request:

# Least-privilege token: this pipeline only reads the repo (no writes or publishes).
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a branch or its PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # `pnpm install` runs the postinstall hook (`wxt prepare`), which generates
      # `.wxt/` types and the ESLint auto-imports config needed by the steps below.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
