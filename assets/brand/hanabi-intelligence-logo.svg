<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g" cx="30%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#2e6be6" />
      <stop offset="60%" stop-color="#1f4fd6" />
      <stop offset="100%" stop-color="#143a9c" />
    </radialGradient>
  </defs>
  <rect width="128" height="128" rx="29" fill="url(#g)" />
  <!-- constellation ring through the outer nodes -->
  <circle cx="64" cy="64" r="42" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.6" fill="none" />
  <!-- one ray = stem + node, pointing north; rotated 8x -->
  <g id="ray">
    <line x1="64" y1="46" x2="64" y2="26" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" />
    <circle cx="64" cy="22" r="4.6" fill="#ffffff" />
  </g>
  <use href="#ray" transform="rotate(45 64 64)" />
  <use href="#ray" transform="rotate(90 64 64)" />
  <use href="#ray" transform="rotate(135 64 64)" />
  <use href="#ray" transform="rotate(180 64 64)" />
  <use href="#ray" transform="rotate(225 64 64)" />
  <use href="#ray" transform="rotate(270 64 64)" />
  <use href="#ray" transform="rotate(315 64 64)" />
  <!-- bright core -->
  <circle cx="64" cy="64" r="8.5" fill="#ffffff" />
</svg>
